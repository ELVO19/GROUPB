<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay with M-Pesa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mpesa-green: #00A651;
            --mpesa-dark: #007A3D;
            --mpesa-light: #E8F7EF;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .payment-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .payment-card {
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        /* Header */
        .card-header-custom {
            background: linear-gradient(135deg, var(--mpesa-green), var(--mpesa-dark));
            padding: 2.2rem 2rem 1.8rem;
            text-align: center;
            position: relative;
        }

        .mpesa-logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 10px 20px;
            margin-bottom: 1rem;
            backdrop-filter: blur(6px);
        }

        .mpesa-logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .mpesa-logo-text span {
            color: #FFD700;
        }

        .card-header-custom h5 {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: 0.3px;
        }

        /* Decorative circles */
        .card-header-custom::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }

        .card-header-custom::after {
            content: '';
            position: absolute;
            bottom: -20px; left: -20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        /* Form area */
        .card-body-custom {
            padding: 2rem;
        }

        .form-label-custom {
            font-size: 0.78rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.4rem;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            z-index: 2;
            pointer-events: none;
        }

        .form-control-custom {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #111827;
            background: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control-custom:focus {
            border-color: var(--mpesa-green);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 166, 81, 0.1);
        }

        .form-control-custom::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        /* Phone prefix badge */
        .phone-prefix {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--mpesa-light);
            color: var(--mpesa-dark);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* Amount quick-select */
        .amount-presets {
            display: flex;
            gap: 8px;
            margin-bottom: 1.4rem;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 6px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: #f9fafb;
            color: #374151;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
        }

        .preset-btn:hover {
            border-color: var(--mpesa-green);
            background: var(--mpesa-light);
            color: var(--mpesa-dark);
        }

        .preset-btn.active {
            border-color: var(--mpesa-green);
            background: var(--mpesa-green);
            color: #fff;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 1.5rem 0;
        }

        /* Summary row */
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--mpesa-light);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 1.5rem;
        }

        .summary-label {
            font-size: 0.82rem;
            color: #6b7280;
            font-weight: 500;
        }

        .summary-amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--mpesa-dark);
        }

        /* Submit button */
        .btn-mpesa {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--mpesa-green), var(--mpesa-dark));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 166, 81, 0.35);
        }

        .btn-mpesa:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 166, 81, 0.45);
            opacity: 0.95;
        }

        .btn-mpesa:active {
            transform: translateY(0);
        }

        .btn-mpesa .btn-icon { font-size: 1.2rem; }

        /* Security note */
        .security-note {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.78rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Footer */
        .card-footer-custom {
            background: #f9fafb;
            border-top: 1px solid #f3f4f6;
            padding: 1rem 2rem;
            text-align: center;
        }

        .card-footer-custom p {
            font-size: 0.78rem;
            color: #9ca3af;
            margin: 0;
        }

        .card-footer-custom span {
            color: var(--mpesa-green);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="payment-wrapper">
    <div class="payment-card">

        <!-- Header -->
        <div class="card-header-custom">
            <div class="mpesa-logo-wrap">
                <span class="mpesa-logo-text">M-<span>PESA</span></span>
            </div>
            <h5>Enter your details to send payment prompt</h5>
        </div>

        <!-- Form -->
        <div class="card-body-custom">
            <form action="" method="POST">
                {% csrf_token %}

                <!-- Phone -->
                <label class="form-label-custom">📱 Phone Number</label>
                <div class="input-group-custom">
                    <span class="input-icon">📞</span>
                    <input
                        type="text"
                        name="phone"
                        placeholder="0712 345 678"
                        class="form-control-custom"
                        required
                    >
                    <span class="phone-prefix">+254</span>
                </div>

                <!-- Amount presets -->
                <label class="form-label-custom">💰 Quick Amount (KES)</label>
                <div class="amount-presets">
                    <div class="preset-btn" onclick="setAmount(100)">100</div>
                    <div class="preset-btn" onclick="setAmount(500)">500</div>
                    <div class="preset-btn" onclick="setAmount(1000)">1,000</div>
                    <div class="preset-btn" onclick="setAmount(2500)">2,500</div>
                    <div class="preset-btn" onclick="setAmount(5000)">5,000</div>
                </div>

                <!-- Amount input -->
                <label class="form-label-custom">✏️ Or Enter Amount</label>
                <div class="input-group-custom">
                    <span class="input-icon">🏷️</span>
                    <input
                        type="number"
                        name="amount"
                        id="amountInput"
                        placeholder="Enter amount in KES"
                        class="form-control-custom"
                        required
                        min="1"
                    >
                </div>

                <hr class="divider">

                <!-- Summary -->
                <div class="summary-row">
                    <span class="summary-label">Total to pay</span>
                    <span class="summary-amount" id="summaryAmount">KES —</span>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-mpesa">
                    <span class="btn-icon">📲</span>
                    SEND PROMPT
                </button>

                <div class="security-note">
                    🔒 Secured by Safaricom M-Pesa
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="card-footer-custom">
            <p>You will receive a prompt on your phone. Enter your <span>M-Pesa PIN</span> to complete.</p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const amountInput = document.getElementById('amountInput');
    const summaryAmount = document.getElementById('summaryAmount');
    const presetBtns = document.querySelectorAll('.preset-btn');

    function setAmount(val) {
        amountInput.value = val;
        summaryAmount.textContent = 'KES ' + val.toLocaleString();
        presetBtns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    amountInput.addEventListener('input', () => {
        const val = parseInt(amountInput.value);
        summaryAmount.textContent = val ? 'KES ' + val.toLocaleString() : 'KES —';
        presetBtns.forEach(b => b.classList.remove('active'));
    });
</script>
</body>
</html>
